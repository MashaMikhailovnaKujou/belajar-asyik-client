<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Guru - Belajar Asyik</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        p.subtitle { color: #7f8c8d; margin-bottom: 25px; }
        .btn-group { margin-bottom: 20px; }
        .btn { padding: 10px 18px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-right: 10px; transition: 0.2s; }
        .btn-excel { background: #27ae60; color: white; }
        .btn-pdf { background: #c0392b; color: white; }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #34495e; color: white; }
        tr:hover { background: #f8fafc; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; }
        .badge-kuis { background: #e1f5fe; color: #0288d1; }
        .badge-latihan { background: #e8f5e9; color: #2e7d32; }
    </style>
</head>
<body>

<div class="container">
    <h1>👨‍🏫 Rekap Nilai: <span id="nama-guru">Guru</span></h1>
    <p class="subtitle">Halaman pemantauan hasil latihan kuis siswa Kelas 3 SD</p>

    <div class="btn-group">
        <button class="btn btn-excel" onclick="downloadExcel()">📊 Unduh Laporan Excel</button>
        <button class="btn btn-pdf" onclick="downloadPDF()">📕 Unduh Laporan PDF</button>
    </div>

    <table>
        <thead>
    <tr>
        <th>No. Absen</th>
        <th>Nama Siswa</th>
        <th>Total Ujian</th>
        <th>Nilai Terbaik</th>
        <th>Tanggal Ujian Terakhir</th>
    </tr>
</thead>
        <tbody id="table-body">
            <tr>
                <td colspan="6" style="text-align: center; color: #95a5a6;">Sedang memuat data rekap nilai...</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    // Token generator statis untuk bypass role Guru di server.js
    const mockToken = btoa(JSON.stringify({ id_user: 1, username: 'pak_guru', role: 'guru' }));

    // 1. Ambil data nilai dari backend saat halaman dibuka
    async function loadScores() {
    try {
        const response = await fetch('http://127.0.0.1:3000/api/guru/rekap-nilai');
        const data = await response.json();
        
        // 🌟 TAMBAHKAN BARIS INI (Ambil elemen tbody berdasarkan ID-nya):
        // Catatan: Pastikan di tag <tbody> HTML kamu memang punya id="table-body" atau sejenisnya
        const tableBody = document.getElementById('table-body'); 
        
        // Kosongkan tabel dulu sebelum diisi data baru agar tidak menumpuk saat di-refresh
        tableBody.innerHTML = '';

        // Masuk ke perulangan data yang kemarin kita ubah
        data.forEach(row => {
            const tr = document.createElement('tr');
            
            const tglSelesai = row.tanggal_terakhir 
                ? new Date(row.tanggal_terakhir).toLocaleDateString('id-ID') 
                : '-';

            tr.innerHTML = `
                <td><strong>${row.no_absen}</strong></td>
                <td><strong>${row.username}</strong></td>
                <td><span class="badge kuis_umum">${row.total_percobaan} Kali</span></td>
                <td><span style="font-weight: bold; color: ${row.nilai_tertinggi >= 70 ? '#2e7d32' : '#c0392b'}">${row.nilai_tertinggi}%</span></td>
                <td><code>${tglSelesai}</code></td>
            `;
            
            // Sekarang baris di bawah ini tidak akan eror lagi karena tableBody sudah didefinisikan di atas!
            tableBody.appendChild(tr);
        });

    } catch (error) {
        console.error('Gagal memuat data:', error);
    }
}

    // 2. Fungsi Download Excel via Backend
    function downloadExcel() {
    window.location.href = 'http://127.0.0.1:3000/api/guru/ekspor/excel';
}

    // 3. Fungsi Download PDF via Backend
    function downloadPDF() {
    window.location.href = 'http://127.0.0.1:3000/api/guru/ekspor/pdf';
}

    // Jalankan penarikan data otomatis
    loadScores();
   const currentGuru = localStorage.getItem('activeUser') ? JSON.parse(localStorage.getItem('activeUser')) : { username: 'Guru' };
document.getElementById('nama-guru').innerText = currentGuru.username;
</script>
</body>
</html>
